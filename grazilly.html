<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Quête Vauban - Énigme N°6</title>
    <style>
        body {
            font-family: "American Typewriter", "Courier New", Courier, serif;
            background-color: #f4ebd8;
            background-image: radial-gradient(circle at center, #fdf6e3 0%, #e6d5b8 100%);
            color: #3a2e24;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            transition: background 0.5s ease, color 0.5s ease;
        }

        body.etape2 {
            background-color: #2B4A3F !important;
            background-image: none !important;
            color: #ffffff !important;
        }

        .container { max-width: 600px; padding: 20px; }
        .logo { max-width: 250px; margin-bottom: 30px; }

        .titre-epreuve { font-size: 1.8rem; font-weight: bold; margin-bottom: 25px; letter-spacing: 2px; }
        body.etape2 .titre-epreuve { color: #ffffff !important; }

        .enigme-texte { font-size: 1.2rem; line-height: 1.5; margin-bottom: 20px; }
        
        .visuel-enigme {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        /* --- Audio masqué par défaut --- */
        .audio-section { display: none; }

        .audio-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .audio-btn { cursor: pointer; width: 60px; height: auto; transition: transform 0.2s ease; }
        .audio-btn:hover { transform: scale(1.1); }
        
        .indice-audio { font-size: 1rem; font-style: italic; color: #555555; margin-bottom: 25px; }
        body.etape2 .indice-audio { color: #dddddd; }

        input[type="text"] {
            font-family: "American Typewriter", "Courier New", Courier, serif;
            font-size: 1rem;
            padding: 10px 15px;
            border: 2px solid #333;
            border-radius: 4px;
            width: 250px;
            margin-bottom: 10px;
        }

        button {
            font-family: "American Typewriter", "Courier New", Courier, serif;
            font-size: 1rem;
            font-weight: bold;
            padding: 10px 20px;
            background-color: #333;
            color: white;
            border: 2px solid #333;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover { background-color: white; color: #333; }

        .erreur { color: #d9534f; font-weight: bold; margin-top: 10px; display: none; }
        
        #message-resultat { display: none; margin-top: 20px; padding: 20px; border: 1px solid #333; background-color: #f9f9f9; text-align: left; }
    </style>
</head>
<body>

    <div class="container">
        <img src="Logo-vauban-turquoise0.png" alt="Logo" class="logo">
        <div class="titre-epreuve">ÉPREUVE N°6</div>

        <!-- Étape 1 : Observation -->
        <div id="zone-observation">
            <p class="enigme-texte">A Martin au ???</p>
            <img src="Enigme-6-grue-quai-launay-grazilly.jpg" alt="Grue" class="visuel-enigme">
            <div class="input-group">
                <input type="text" id="obs-input" placeholder="Réponse">
                <br>
                <button onclick="verifierObservation()">Valider</button>
            </div>
        </div>

        <!-- Étape 2 : Audio et Enigme (Masqués) -->
        <div id="zone-enigme" class="audio-section">
            <audio id="enigme-audio" src="Kalimba-lecture-notes-Japonais.mp3"></audio>
            <div class="audio-controls">
                <img src="Play0.png" alt="Jouer" class="audio-btn" onclick="jouerAudio()">
                <img src="Stop0.png" alt="Arrêter" class="audio-btn" onclick="stopperAudio()">
            </div>
            <p class="indice-audio">Vos yeux ne suffiront pas ici. Mettez le son.</p>
            <!-- (Ajoutez ici le champ texte pour l'énigme si nécessaire) -->
        </div>

        <p class="compteur" id="texte-compteur">Tentatives restantes : <span id="nb-essais">4</span></p>
        <div id="message-erreur" class="erreur">Mauvaise réponse.</div>

        <div id="message-resultat">
            <h3>Bravo !</h3>
            <p>La « Ville Intra-Muros » et ses vides, le paradoxe de la cité idéale...</p>
            <!-- Texte complet à insérer ici -->
        </div>
    </div>

    <script>
        let tentatives = 4;
        function jouerAudio() { document.getElementById("enigme-audio").play(); }
        function stopperAudio() { let a = document.getElementById("enigme-audio"); a.pause(); a.currentTime = 0; }

        function verifierObservation() {
            let val = document.getElementById("obs-input").value.trim().toLowerCase();
            if(val === "mans") {
                document.getElementById("zone-observation").style.display = "none";
                document.getElementById("zone-enigme").style.display = "block";
                document.body.classList.add("etape2");
            } else {
                tentatives--;
                document.getElementById("nb-essais").textContent = tentatives;
                document.getElementById("message-erreur").style.display = "block";
            }
        }
    </script>
</body>
</html>
